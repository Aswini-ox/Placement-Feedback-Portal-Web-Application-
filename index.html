<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Placement Feedback Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #f4f6f9;
    }

    /* Header (Gov style) */
    .header {
      background: #003366;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      letter-spacing: 1px;
      animation: slideDown 0.6s ease;
    }

    /* Container */
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      animation: fadeIn 0.8s ease;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #003366;
    }

    label {
      font-size: 14px;
      color: #333;
      display: block;
      margin-top: 10px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
      transition: 0.3s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #003366;
      outline: none;
      box-shadow: 0 0 5px rgba(0,51,102,0.2);
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #003366;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #002244;
    }

    .success {
      display: none;
      margin-top: 15px;
      color: green;
      text-align: center;
      font-weight: bold;
      animation: fadeIn 0.5s ease;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }

  </style>
</head>

<body>

<div class="header">
  Placement Feedback Portal - 2026
</div>

<div class="container">
  <h2>Student Feedback Form</h2>

  <form id="feedbackForm">
    <label>Full Name</label>
    <input type="text" id="name" required>

    <label>Email Address</label>
    <input type="email" id="email" required>

    <label>Department</label>
    <select id="department" required>
      <option value="">Select</option>
      <option>CSE</option>
      <option>IT</option>
      <option>ECE</option>
      <option>EEE</option>
    </select>

    <label>Placement Training Rating</label>
    <select id="rating" required>
      <option value="">Select</option>
      <option>Excellent</option>
      <option>Good</option>
      <option>Average</option>
      <option>Poor</option>
    </select>

    <label>Suggestions</label>
    <textarea id="message" rows="4"></textarea>

    <button type="submit">Submit Feedback</button>
  </form>

  <p class="success" id="successMsg">
    ✔ Feedback submitted successfully
  </p>
</div>

<script src="script.js"></script>

</body>
</html>
